name: emb-server gem

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths: ["gems/emb-server/**"]
  pull_request:
    paths: ["gems/emb-server/**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - name: Install ONNX Runtime
        run: |
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION#v}.tgz" \
            -o /tmp/onnx.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar xzf /tmp/onnx.tgz -C /opt/onnxruntime --strip-components=1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install libtokenizers
        run: |
          sudo mkdir -p /opt/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/libtokenizers.linux-x86_64.tar.gz" \
            -o /tmp/libtokenizers.tgz
          sudo tar xzf /tmp/libtokenizers.tgz -C /opt/libtokenizers

      - name: Build emb binary
        run: |
          CGO_ENABLED=1 \
            CGO_CFLAGS="-I/opt/onnxruntime/include" \
            CGO_LDFLAGS="-L/opt/onnxruntime/lib -lonnxruntime -L/opt/libtokenizers" \
            go build -ldflags="-X main.version=ci" -o /tmp/emb-binary ./cmd/emb

      - name: Copy binary into gem structure
        run: |
          mkdir -p gems/emb-server/lib/emb-server
          cp /tmp/emb-binary gems/emb-server/lib/emb-server/emb-binary-x86_64-linux

      - name: Build gem
        working-directory: gems/emb-server
        run: gem build emb-server.gemspec
