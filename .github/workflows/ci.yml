name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Install libtokenizers
        run: |
          sudo mkdir -p /opt/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v1.27.0/libtokenizers.linux-x86_64.tar.gz" \
            -o /tmp/libtokenizers.tgz
          sudo tar xzf /tmp/libtokenizers.tgz -C /opt/libtokenizers
          rm /tmp/libtokenizers.tgz

      - name: Format check
        run: |
          test -z "$(gofmt -l .)" || { echo "Run 'gofmt -s -w .' to fix formatting"; exit 1; }

      - name: Vet
        run: go vet ./internal/config/... ./internal/hfhub/...
        env:
          CGO_ENABLED: "0"

      - name: Vet (CGo)
        run: go vet ./internal/tokenizer/...
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L/opt/libtokenizers"

      - name: Test
        run: go test -short ./internal/config/... ./internal/hfhub/...
        env:
          CGO_ENABLED: "0"

      - name: Test (CGo)
        run: go test -short ./internal/tokenizer/...
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L/opt/libtokenizers"
