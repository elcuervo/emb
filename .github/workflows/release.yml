name: Release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
  DOCKER_USER: ${{ vars.DOCKER_USER || 'elcuervo' }}

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for testing (e.g., v0.0.1-test)"
        required: false
        default: "v0.0.0-ci"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install libtokenizers
        run: |
          sudo mkdir -p /opt/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/libtokenizers.linux-x86_64.tar.gz" \
            -o /tmp/libtokenizers.tgz
          sudo tar xzf /tmp/libtokenizers.tgz -C /opt/libtokenizers

      - name: Install ONNX Runtime
        run: |
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION#v}.tgz" \
            -o /tmp/onnx.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar xzf /tmp/onnx.tgz -C /opt/onnxruntime --strip-components=1

      - name: Test
        run: go test -short ./internal/config/... ./internal/hfhub/...
        env:
          CGO_ENABLED: "0"

      - name: Test (CGo)
        run: go test -short ./internal/pipeline/... ./internal/registry/...
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L/opt/libtokenizers"

  build-linux-amd64:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - name: Write version from tag
        run: |
          TV="${{ github.event.release.tag_name || github.ref_name || inputs.tag_name }}"
          echo "${TV#v}" > VERSION

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set tag name
        run: echo "TAG_NAME=${{ github.event.release.tag_name || github.ref_name || inputs.tag_name }}" >> $GITHUB_ENV

      - name: Install libtokenizers
        run: |
          sudo mkdir -p /opt/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/libtokenizers.linux-x86_64.tar.gz" \
            -o /tmp/libtokenizers.tgz
          sudo tar xzf /tmp/libtokenizers.tgz -C /opt/libtokenizers

      - name: Install ONNX Runtime
        run: |
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION#v}.tgz" \
            -o /tmp/onnx.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar xzf /tmp/onnx.tgz -C /opt/onnxruntime --strip-components=1

      - name: Build binary
        run: |
          mkdir -p dist/linux-amd64
          CGO_ENABLED=1 \
            CGO_CFLAGS="-I/opt/onnxruntime/include" \
            CGO_LDFLAGS="-L/opt/onnxruntime/lib -lonnxruntime -L/opt/libtokenizers -Wl,-rpath,\$ORIGIN" \
            go build -ldflags="-X main.version=${TAG_NAME#v}" -o dist/linux-amd64/emb ./cmd/emb

      - name: Package artifact
        run: |
          VNUM="${TAG_NAME#v}"
          cp /opt/onnxruntime/lib/libonnxruntime.so* dist/linux-amd64/
          cd dist/linux-amd64 && tar czf "../emb_${VNUM}_linux_amd64.tar.gz" emb libonnxruntime.so*

      - uses: softprops/action-gh-release@v2
        if: github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: dist/emb_*_linux_amd64.tar.gz
          make_latest: false
          fail_on_unmatched_files: true

  build-linux-arm64:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - name: Write version from tag
        run: |
          TV="${{ github.event.release.tag_name || github.ref_name || inputs.tag_name }}"
          echo "${TV#v}" > VERSION

      - name: Set tag name
        run: echo "TAG_NAME=${{ github.event.release.tag_name || github.ref_name || inputs.tag_name }}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build Linux arm64 binary via Docker
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --output type=local,dest=./dist/linux-arm64 \
            --build-arg ORT_VERSION=${ORT_VERSION} \
            --build-arg TOKENIZERS_VERSION=${TOKENIZERS_VERSION} \
            .

      - name: Package artifact
        run: |
          VNUM="${TAG_NAME#v}"
          mkdir -p dist/linux-arm64-pkg
          cp dist/linux-arm64/usr/local/bin/emb dist/linux-arm64-pkg/
          cp dist/linux-arm64/usr/lib/libonnxruntime.so* dist/linux-arm64-pkg/
          cd dist/linux-arm64-pkg && tar czf "../emb_${VNUM}_linux_arm64.tar.gz" emb libonnxruntime.so*

      - uses: softprops/action-gh-release@v2
        if: github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: dist/emb_*_linux_arm64.tar.gz
          make_latest: false
          fail_on_unmatched_files: true

  build-darwin-arm64:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - name: Write version from tag
        run: |
          TV="${{ github.event.release.tag_name || github.ref_name || inputs.tag_name }}"
          echo "${TV#v}" > VERSION

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set tag name
        run: echo "TAG_NAME=${{ github.event.release.tag_name || github.ref_name || inputs.tag_name }}" >> $GITHUB_ENV

      - name: Install ONNX Runtime
        run: brew install onnxruntime

      - name: Install libtokenizers
        run: |
          mkdir -p ./lib/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/libtokenizers.darwin-arm64.tar.gz" \
            | tar xz -C ./lib/libtokenizers

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 \
            CGO_CFLAGS="-I/opt/homebrew/opt/onnxruntime/include" \
            CGO_LDFLAGS="-L/opt/homebrew/opt/onnxruntime/lib -lonnxruntime -L./lib/libtokenizers -Wl,-rpath,@loader_path" \
            go build -ldflags="-X main.version=${TAG_NAME#v}" -o dist/emb ./cmd/emb

      - name: Package artifact
        run: |
          VNUM="${TAG_NAME#v}"
          cp -L /opt/homebrew/opt/onnxruntime/lib/libonnxruntime*.dylib dist/
          cd dist && tar czf "emb_${VNUM}_darwin_arm64.tar.gz" emb libonnxruntime*.dylib

      - uses: softprops/action-gh-release@v2
        if: github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: dist/emb_*_darwin_arm64.tar.gz
          make_latest: false
          fail_on_unmatched_files: true

  docker:
    needs: [build-linux-amd64, build-linux-arm64, build-darwin-arm64]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source versions
        run: cat .github/versions.env >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKER_USER }}/emb
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            ORT_VERSION=${{ env.ORT_VERSION }}
            TOKENIZERS_VERSION=${{ env.TOKENIZERS_VERSION }}

  test-gems:
    needs: [build-linux-amd64]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set tag name
        run: echo "TAG_NAME=${{ github.event.release.tag_name || github.ref_name }}" >> $GITHUB_ENV

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Download emb binary from release
        run: |
          gh release download "${{ env.TAG_NAME }}" \
            --pattern "emb_*_linux_amd64.tar.gz" \
            --dir /tmp/emb-test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start emb server
        run: |
          cd /tmp/emb-test
          tar xzf *.tar.gz
          chmod +x emb
          mkdir -p "${{ github.workspace }}/models"
          LD_LIBRARY_PATH="/opt/onnxruntime/lib:$LD_LIBRARY_PATH" \
            ./emb -model minilm -model-repo Xenova/all-MiniLM-L6-v2 -listen ":16379" &
          sleep 10

      - name: Run emb gem tests
        working-directory: gems/emb
        run: |
          bundle install
          bundle exec rake

      - name: Validate emb-server gem build
        run: |
          cp /tmp/emb-test/emb "${{ github.workspace }}/gems/emb-server/lib/emb-server/emb-binary-linux-amd64"
          cd "${{ github.workspace }}/gems/emb-server"
          gem build emb-server.gemspec

      - name: Cleanup
        run: pkill -f "emb -model-repo" 2>/dev/null || true

  release-emb:
    needs: [test-gems]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        run: |
          cd "${{ github.workspace }}/gems/emb"
          gem build emb.gemspec

      - uses: rubygems/configure-rubygems-credentials@main

      - name: Publish gem
        run: gem push "${{ github.workspace }}/gems/emb"/emb-*.gem

  release-emb-server:
    needs: [test-gems, build-linux-amd64, build-linux-arm64, build-darwin-arm64]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Set tag name
        run: echo "TAG_NAME=${{ github.event.release.tag_name || github.ref_name }}" >> $GITHUB_ENV

      - name: Download all platform binaries
        run: |
          for pattern in emb_*_linux_amd64.tar.gz emb_*_linux_arm64.tar.gz emb_*_darwin_arm64.tar.gz; do
            gh release download "${{ env.TAG_NAME }}" --pattern "$pattern" --dir /tmp/emb-gem
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy binaries into gem structure
        run: |
          mkdir -p "${{ github.workspace }}/gems/emb-server/lib/emb-server"
          cd /tmp/emb-gem
          for tarball in *.tar.gz; do
            case "$tarball" in
              *_linux_amd64*)  name="emb-binary-x86_64-linux" ;;
              *_linux_arm64*)  name="emb-binary-aarch64-linux" ;;
              *_darwin_arm64*) name="emb-binary-arm64-darwin" ;;
            esac
            tar xzf "$tarball"
            cp emb "${{ github.workspace }}/gems/emb-server/lib/emb-server/$name"
          done

      - name: Build gem
        run: |
          cd "${{ github.workspace }}/gems/emb-server"
          gem build emb-server.gemspec

      - uses: rubygems/configure-rubygems-credentials@main

      - name: Publish gem
        run: gem push "${{ github.workspace }}/gems/emb-server"/emb-server-*.gem
