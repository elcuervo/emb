name: Release

on:
  release:
    types: [published]

env:
  ORT_VERSION: v1.27.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install libtokenizers
        run: |
          sudo mkdir -p /opt/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v1.27.0/libtokenizers.linux-x86_64.tar.gz" \
            -o /tmp/libtokenizers.tgz
          sudo tar xzf /tmp/libtokenizers.tgz -C /opt/libtokenizers

      - name: Install ONNX Runtime
        run: |
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/${ORT_VERSION}/onnxruntime-linux-x86_64-${ORT_VERSION#v}.tgz" \
            -o /tmp/onnx.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar xzf /tmp/onnx.tgz -C /opt/onnxruntime --strip-components=1

      - name: Test
        run: go test -short ./internal/config/... ./internal/hfhub/...
        env:
          CGO_ENABLED: "0"

      - name: Test (CGo)
        run: go test -short ./internal/pipeline/... ./internal/registry/...
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L/opt/libtokenizers"

  release-linux:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: elcuervo
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: elcuervo/emb
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Extract binary for linux/amd64
        run: docker buildx build --platform linux/amd64 --output type=local,dest=./dist/linux-amd64 .
      - name: Archive linux/amd64
        run: |
          cd dist/linux-amd64 && tar czf ../emb-${{ github.event.release.tag_name }}-linux-amd64.tar.gz emb libonnxruntime.so*

      - name: Extract binary for linux/arm64
        run: docker buildx build --platform linux/arm64 --output type=local,dest=./dist/linux-arm64 .
      - name: Archive linux/arm64
        run: |
          cd dist/linux-arm64 && tar czf ../emb-${{ github.event.release.tag_name }}-linux-arm64.tar.gz emb libonnxruntime.so*

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/emb-${{ github.event.release.tag_name }}-linux-amd64.tar.gz
            dist/emb-${{ github.event.release.tag_name }}-linux-arm64.tar.gz

  release-macos:
    needs: [test]
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install ONNX Runtime
        run: brew install onnxruntime

      - name: Install libtokenizers
        run: |
          mkdir -p ./lib/libtokenizers
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v1.27.0/libtokenizers.darwin-${{ matrix.arch }}.tar.gz" \
            | tar xz -C ./lib/libtokenizers

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
